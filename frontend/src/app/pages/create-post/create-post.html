<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold text-white mb-1">Share Anonymously</h1>
  <p class="text-gray-500 text-sm mb-6">Your identity stays hidden. Just talk.</p>

  <div *ngIf="error" class="bg-red-900/30 border border-red-800 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
    {{ error }}
  </div>

  <form (ngSubmit)="submit()" class="flex flex-col gap-4">

    <!-- Title -->
    <div>
      <label class="text-sm text-gray-400 mb-1 block">Title</label>
      <div class="bg-gray-800 border border-gray-700 rounded-lg flex items-center gap-2 px-3 focus-within:border-primary transition-colors">
        <input [(ngModel)]="title" name="title"
          class="bg-transparent text-gray-100 py-2 flex-1 outline-none placeholder-gray-600 text-sm"
          placeholder="What's on your mind?" maxlength="255" required />
        <app-emoji-picker (emojiSelect)="insertEmoji('title', $event)" />
      </div>
    </div>

    <!-- Content -->
    <div>
      <label class="text-sm text-gray-400 mb-1 block">Content</label>
      <div class="bg-gray-800 border border-gray-700 rounded-lg focus-within:border-primary transition-colors">
        <textarea #contentRef [(ngModel)]="content" name="content"
          class="bg-transparent text-gray-100 px-3 pt-3 w-full outline-none placeholder-gray-600 text-sm resize-none"
          rows="5" placeholder="Share your story, ask for advice..." required></textarea>
        <div class="flex items-center justify-between px-3 pb-2 border-t border-gray-700 mt-1 pt-2">
          <app-emoji-picker (emojiSelect)="insertEmoji('content', $event)" />
          <span class="text-xs text-gray-600">{{ content.length }} chars</span>
        </div>
      </div>
    </div>

    <!-- Tags -->
    <div>
      <label class="text-sm text-gray-400 mb-2 block">Tags (select all that apply)</label>
      <div class="flex flex-wrap gap-2">
        <button type="button" *ngFor="let t of tags" (click)="toggleTag(t)"
          [class]="selectedTags.includes(t) ? 'tag bg-indigo-700/60 text-white cursor-pointer' : 'tag cursor-pointer hover:bg-indigo-800/50'">
          {{ t }}
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary w-full mt-2" [disabled]="submitting">
      {{ submitting ? 'Posting...' : '🎭 Post Anonymously' }}
    </button>
  </form>
</div>
