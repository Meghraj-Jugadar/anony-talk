<div *ngIf="loading$ | async">
  <!-- Top progress bar -->
  <div class="fixed top-0 left-0 w-full z-[100] h-0.5 bg-gray-800 overflow-hidden">
    <div class="h-full bg-primary animate-progress"></div>
  </div>
  <!-- Center spinner overlay -->
  <div class="fixed inset-0 z-[99] flex items-center justify-center pointer-events-none">
    <div class="bg-gray-900/80 backdrop-blur-sm rounded-2xl p-5 flex items-center gap-3 shadow-xl border border-gray-800">
      <svg class="animate-spin w-5 h-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span class="text-sm text-gray-300 font-medium">Loading...</span>
    </div>
  </div>
</div>
