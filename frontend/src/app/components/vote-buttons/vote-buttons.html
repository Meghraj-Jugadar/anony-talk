<div class="flex items-center gap-2">

  <!-- Heart (upvote) -->
  <button (click)="onVote('up')"
    class="flex items-center gap-1.5 text-sm font-medium transition-all"
    [ngClass]="voted === 'up' ? 'text-pink-400' : 'text-gray-500 hover:text-pink-400'">
    <span class="text-base leading-none">{{ voted === 'up' ? '❤️' : '🤍' }}</span>
    <span>{{ upvotes }}</span>
  </button>

  <!-- Broken Heart (downvote) -->
  <button (click)="onVote('down')"
    class="flex items-center gap-1.5 text-sm font-medium transition-all"
    [ngClass]="voted === 'down' ? 'text-red-400' : 'text-gray-500 hover:text-red-400'">
    <span class="text-base leading-none">{{ voted === 'down' ? '💔' : '🖤' }}</span>
    <span>{{ downvotes }}</span>
  </button>

</div>
