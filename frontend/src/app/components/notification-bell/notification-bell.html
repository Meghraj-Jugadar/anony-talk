<div class="relative">
  <button (click)="toggle()" class="relative p-2 text-gray-400 hover:text-white transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
      <path fill-rule="evenodd" d="M5.25 9a6.75 6.75 0 0 1 13.5 0v.75c0 2.123.8 4.057 2.118 5.52a.75.75 0 0 1-.297 1.206c-1.544.57-3.16.99-4.831 1.243a3.75 3.75 0 1 1-7.48 0 24.585 24.585 0 0 1-4.831-1.244.75.75 0 0 1-.298-1.205A8.217 8.217 0 0 0 5.25 9.75V9Zm4.502 8.9a2.25 2.25 0 1 0 4.496 0 25.057 25.057 0 0 1-4.496 0Z" clip-rule="evenodd" />
    </svg>
    <span *ngIf="unreadCount > 0"
      class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <!-- Dropdown -->
  <div *ngIf="open"
    class="absolute right-0 top-10 w-80 bg-gray-900 border border-gray-800 rounded-xl shadow-2xl z-50 overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
      <span class="font-semibold text-white text-sm">Notifications</span>
      <button (click)="open=false" class="text-gray-500 hover:text-white text-xs">✕</button>
    </div>

    <div class="max-h-80 overflow-y-auto">
      <div *ngIf="notifications.length === 0" class="text-center py-8 text-gray-500 text-sm">
        No notifications yet
      </div>
      <div *ngFor="let n of notifications"
        [class]="n.is_read ? 'px-4 py-3 border-b border-gray-800/50' : 'px-4 py-3 border-b border-gray-800/50 bg-indigo-950/30'">
        <a [routerLink]="['/post', n.post_id]" (click)="open=false" class="block">
          <div class="flex items-start gap-2">
            <span class="text-base mt-0.5">{{ n.type === 'new_comment' ? '💬' : '🔔' }}</span>
            <div>
              <p class="text-sm text-gray-300">{{ n.message }}</p>
              <p class="text-xs text-gray-600 mt-0.5">{{ n.created_at | date:'shortTime' }}</p>
            </div>
            <span *ngIf="!n.is_read" class="ml-auto w-2 h-2 bg-primary rounded-full mt-1 flex-shrink-0"></span>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
